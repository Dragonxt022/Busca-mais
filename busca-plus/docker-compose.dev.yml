version: '3.8'

services:
  # Search UI - Development with hot reload
  search-ui:
    image: node:18-alpine
    container_name: busca-plus-search-dev
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/index.js"
    environment:
      NODE_ENV: development
      TYPESENSE_HOST: localhost
      TYPESENSE_PORT: 8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-buscaplus_api_key}
      CRAWLER_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ../busca-plus-search:/app
      - /app/node_modules
    networks:
      - busca-plus-network

networks:
  busca-plus-network:
    external: true
