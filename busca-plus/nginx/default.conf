# =============================================================
# Busca+ — Nginx Reverse Proxy
#
# Domínios esperados:
#   seudominio.com.br        → serviço de busca (porta 3000)
#   admin.seudominio.com.br  → painel admin/crawler (porta 3001)
#
# Para ativar SSL com Let's Encrypt:
#   certbot --nginx -d seudominio.com.br -d admin.seudominio.com.br
# =============================================================

# --- Busca pública ---
server {
    listen 80;
    server_name seudominio.com.br www.seudominio.com.br;

    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/search-access.log;
    error_log  /var/log/nginx/search-error.log;

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Arquivos estáticos com cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://search:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://search:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# --- Painel Admin / API Crawler ---
server {
    listen 80;
    server_name admin.seudominio.com.br;

    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/admin-access.log;
    error_log  /var/log/nginx/admin-error.log;

    # Restringir acesso ao painel admin por IP (descomente e ajuste)
    # allow 203.0.113.0/24;
    # deny  all;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass         http://crawler:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
